name: Publish to crates.io

on:
  release:
    types:
      - published
      - released

permissions:
  contents: read

concurrency:
  group: publish-crates-io-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish crate
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Validate release tag matches crate version
        run: |
          crate_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          expected_tag="v${crate_version}"
          release_tag="${{ github.event.release.tag_name }}"

          if [ "${release_tag}" != "${expected_tag}" ]; then
            echo "Release tag ${release_tag} does not match Cargo.toml package.version ${crate_version}." >&2
            echo "Expected release tag: ${expected_tag}" >&2
            exit 1
          fi

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish crate
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
